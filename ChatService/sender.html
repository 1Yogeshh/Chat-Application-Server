<!DOCTYPE html>
<html>

<head>
  <title>Chat Sender</title>
</head>

<body>
  <h2>📤 Chat Sender</h2>

  <input id="chatId" placeholder="Chat ID" />
  <br /><br />

  <input id="receiverId" placeholder="Receiver User ID" />
  <br /><br />

  <input id="message" placeholder="Message" />
  <br /><br />

  <button onclick="sendMessage()">Send Message</button>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    // 🔐 SENDER JWT TOKEN
    const token =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2NDVlOGY5OS04ODUxLTQzYTUtOTM5NS1lYjJjNjBjYjE3N2MiLCJlbWFpbCI6Imtpc2hpa2FAZ21haWwuY29tIiwiaWF0IjoxNzY4NjY3NjA2LCJleHAiOjE3NjkyNzI0MDZ9.QUZsRMexphwXGAxyS5A5gufa1LPw0VQU-vwlbmSSFc0";

    const socket = io("http://localhost:5002", {
      auth: { token },
    });

    socket.on("connect", () => {
      console.log("🟢 Sender Connected:", socket.id);
    });

    socket.on("connect_error", (err) => {
      console.log("🔴 Sender Error:", err.message);
    });

    function sendMessage() {
      const chatId = document.getElementById("chatId").value;
      const receiverId = document.getElementById("receiverId").value;
      const content = document.getElementById("message").value;

      socket.emit("send-message", {
        chatId,
        receiverId,
        content
      });

      console.log("📤 Message sent");
    }
  </script>
</body>

</html>
