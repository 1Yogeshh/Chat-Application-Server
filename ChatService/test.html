<!DOCTYPE html>
<html>

<head>
  <title>Chat Receiver</title>
</head>

<body>
  <h2>📥 Chat Receiver</h2>

  <input id="activeChatId" placeholder="Active Chat ID" />
  <br /><br />

  <ul id="messages"></ul>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    // 🔐 RECEIVER JWT TOKEN
    const token =
      "PASTE_RECEIVER_JWT_HERE";

    const socket = io("http://localhost:5002", {
      auth: { token },
    });

    socket.on("connect", () => {
      console.log("🟢 Receiver Connected:", socket.id);
    });

    socket.on("connect_error", (err) => {
      console.log("🔴 Receiver Error:", err.message);
    });

    // 📥 Listen for new messages
    socket.on("new-message", (message) => {
      const activeChatId =
        document.getElementById("activeChatId").value;

      // ✅ chatId match check
      if (message.chatId !== activeChatId) {
        console.log("⏭ Message ignored (different chat)");
        return;
      }

      const li = document.createElement("li");
      li.innerText = `${message.senderId}: ${message.content}`;
      document.getElementById("messages").appendChild(li);

      console.log("📥 Message received:", message);
    });
  </script>
</body>

</html>
